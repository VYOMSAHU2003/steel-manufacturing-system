services:
  - type: web
    name: steel-manufacturing-system-python
    env: python
    plan: free
    buildCommand: |
      echo "Installing Python dependencies..."
      pip install --upgrade pip setuptools wheel
      pip install --only-binary :all: -r requirements-render.txt
      echo "Dependencies installed successfully"
    startCommand: |
      echo "Starting Steel Manufacturing System..."
      exec streamlit run app.py --server.port=$PORT --server.address=0.0.0.0 --server.headless=true --logger.level=info
    envVars:
      - key: PYTHON_VERSION
        value: 3.9.16
      - key: USE_SQLITE
        value: true
      - key: STREAMLIT_SERVER_HEADLESS
        value: true
      - key: STREAMLIT_BROWSER_GATHERUSAGESTATS
        value: false
    autoDeploy: true