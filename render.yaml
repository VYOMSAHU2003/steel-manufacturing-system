services:
  - type: web
    name: steel-manufacturing-system
    env: python
    plan: free
    buildCommand: pip install -r requirements-deploy.txt
    startCommand: streamlit run app.py --server.port=$PORT --server.address=0.0.0.0 --server.headless=true
    envVars:
      - key: PYTHON_VERSION
        value: 3.9
      - key: USE_SQLITE
        value: true
    autoDeploy: true