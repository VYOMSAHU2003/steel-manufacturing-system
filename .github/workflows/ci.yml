name: 🏭 Steel Manufacturing System CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.8, 3.9, '3.10', '3.11']

    steps:
    - name: 📥 Checkout Repository
      uses: actions/checkout@v4

    - name: 🐍 Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: 📦 Cache Dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: 🔧 Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install flake8 pytest black isort

    - name: 🎨 Code Style Check with Black
      run: |
        black --check --diff .

    - name: 📋 Import Sorting Check with isort
      run: |
        isort --check-only --diff .

    - name: 🔍 Lint with flake8
      run: |
        # Stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # Exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=100 --statistics

    - name: 🗄️ Initialize Test Database
      run: |
        python scripts/init_db.py
      env:
        PYTHONPATH: .

    - name: 🧪 Run Application Health Check
      run: |
        python -c "
        import sys
        import os
        sys.path.append('.')
        
        # Test imports
        try:
            from config.database import get_db_session, SessionLocal
            from models.database_models import User, RawMaterial, ProductionOrder
            from utils.auth import hash_password, verify_password
            print('✅ All imports successful')
        except Exception as e:
            print(f'❌ Import error: {e}')
            sys.exit(1)
            
        # Test database connection
        try:
            db = SessionLocal()
            users = db.query(User).count()
            print(f'✅ Database connection successful. Users: {users}')
            db.close()
        except Exception as e:
            print(f'❌ Database error: {e}')
            sys.exit(1)
            
        print('🎉 All health checks passed!')
        "

  quality:
    runs-on: ubuntu-latest
    needs: test

    steps:
    - name: 📥 Checkout Repository
      uses: actions/checkout@v4

    - name: 🐍 Set up Python 3.9
      uses: actions/setup-python@v4
      with:
        python-version: 3.9

    - name: 🔧 Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install bandit safety

    - name: 🔒 Security Check with Bandit
      run: |
        bandit -r . -f json -o bandit-report.json || true

    - name: 🛡️ Safety Check for Vulnerabilities
      run: |
        safety check --json --output safety-report.json || true

    - name: 📊 Generate Code Quality Report
      run: |
        echo "## 📊 Code Quality Report" >> quality-report.md
        echo "" >> quality-report.md
        echo "### 🔒 Security Analysis" >> quality-report.md
        if [ -f bandit-report.json ]; then
          echo "- Bandit security scan completed" >> quality-report.md
        fi
        echo "" >> quality-report.md
        echo "### 🛡️ Dependency Vulnerabilities" >> quality-report.md
        if [ -f safety-report.json ]; then
          echo "- Safety vulnerability scan completed" >> quality-report.md
        fi
        cat quality-report.md

  build-status:
    runs-on: ubuntu-latest
    needs: [test, quality]
    if: always()

    steps:
    - name: 📊 Build Status Summary
      run: |
        echo "## 🏭 Steel Manufacturing System Build Summary"
        echo ""
        echo "### Test Results:"
        echo "- Matrix Tests: ${{ needs.test.result }}"
        echo "- Quality Checks: ${{ needs.quality.result }}"
        echo ""
        if [ "${{ needs.test.result }}" = "success" ] && [ "${{ needs.quality.result }}" = "success" ]; then
          echo "✅ **ALL CHECKS PASSED** - Ready for deployment!"
        else
          echo "❌ **SOME CHECKS FAILED** - Please review the logs"
        fi